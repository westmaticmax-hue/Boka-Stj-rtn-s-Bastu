<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bokning av bastun</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f2f4f7;
margin:0;
padding:25px;
font-size:18px;
}

.container{
max-width:500px;
margin:auto;
}

h1{
text-align:center;
font-size:34px;
margin-bottom:25px;
}

.card{
background:white;
padding:25px;
border-radius:16px;
box-shadow:0 6px 16px rgba(0,0,0,0.1);
margin-bottom:25px;
}

.quick{
display:flex;
gap:10px;
margin-bottom:20px;
}

.quick button{
flex:1;
padding:14px;
border:none;
border-radius:10px;
background:#e5e7eb;
font-size:18px;
}

label{
display:block;
margin-top:15px;
font-weight:600;
}

input,select{
width:100%;
padding:14px;
font-size:18px;
border-radius:10px;
border:1px solid #ccc;
margin-top:5px;
}

.book{
width:100%;
margin-top:25px;
padding:16px;
font-size:20px;
background:#2e7d32;
color:white;
border:none;
border-radius:12px;
}

.booking{
background:white;
padding:16px;
border-radius:12px;
margin-bottom:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
font-size:18px;
}

</style>
</head>

<body>

<div class="container">

<h1>Bokning av bastun</h1>

<div class="card">

<div class="quick">
<button onclick="bookNow()">Boka nu</button>
<button onclick="setToday()">Idag</button>
<button onclick="setTomorrow()">Imorgon</button>
</div>

<label>Datum</label>
<input type="date" id="date">

<label>Starttid</label>
<input type="time" id="time">

<label>Längd</label>
<select id="hours">
<option value="1">1 timme</option>
<option value="2">2 timmar</option>
<option value="3">3 timmar</option>
</select>

<button class="book" onclick="book()">Boka bastu</button>

</div>

<h2>Bokningar</h2>

<div id="bookings"></div>

</div>

<script>

const { createClient } = supabase

const client = createClient(
"https://kcjiujdgeqjajvimweuj.supabase.co",
"sb_publishable_s4CHMttu96f7d-j3KZ3vAg_PftStbk-"
)

function setToday(){
let d=new Date()
document.getElementById("date").value=d.toISOString().split("T")[0]
}

function setTomorrow(){
let d=new Date()
d.setDate(d.getDate()+1)
document.getElementById("date").value=d.toISOString().split("T")[0]
}

function bookNow(){

let now=new Date()

let h=now.getHours().toString().padStart(2,'0')
let m=now.getMinutes().toString().padStart(2,'0')

document.getElementById("time").value=h+":"+m

setToday()

}

async function book(){

let date=document.getElementById("date").value
let start=document.getElementById("time").value
let hours=parseInt(document.getElementById("hours").value)

if(!date || !start){
alert("Välj datum och tid")
return
}

let parts=start.split(":")
let startDate=new Date()

startDate.setHours(parts[0])
startDate.setMinutes(parts[1])

let endDate=new Date(startDate.getTime()+hours*3600000)

let end=endDate.toTimeString().slice(0,5)


// hämta bokningar samma dag
const { data } = await client
.from("bookings")
.select("*")
.eq("date",date)


// kontrollera överlapp
let conflict=false

data.forEach(b=>{

if(
(start < b.end_time) &&
(end > b.start)
){
conflict=true
}

})

if(conflict){

alert("⚠️ Den tiden är redan reserverad")

return
}


// spara bokning
const { error } = await client
.from("bookings")
.insert([
{
date:date,
start:start,
end_time:end
}
])

if(error){

alert("Databasfel: "+error.message)

return
}

alert("Bokning sparad!")

loadBookings()

}

async function loadBookings(){

const { data } = await client
.from("bookings")
.select("*")
.order("date",{ascending:true})

let html=""

data.forEach(b=>{

html+=`
<div class="booking">
${b.date} ${b.start} → ${b.end_time}
</div>
`

})

document.getElementById("bookings").innerHTML=html

}

loadBookings()

</script>

</body>
</html>
