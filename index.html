<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bastu Bokning</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f4f6f8;
margin:0;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:25px;
}

.card{
background:white;
padding:20px;
border-radius:14px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
margin-bottom:20px;
}

.quick{
display:flex;
gap:10px;
margin-bottom:15px;
}

.quick button{
flex:1;
padding:12px;
border:none;
border-radius:8px;
background:#e3e7ec;
font-size:16px;
}

label{
display:block;
margin-top:10px;
font-weight:600;
}

input,select{
width:100%;
padding:12px;
margin-top:5px;
border-radius:8px;
border:1px solid #ddd;
font-size:16px;
}

button.book{
width:100%;
margin-top:20px;
padding:14px;
background:#2e7d32;
color:white;
border:none;
border-radius:10px;
font-size:18px;
}

.booking{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

</style>
</head>

<body>

<div class="container">

<h1>🔥 Bastu Bokning</h1>

<div class="card">

<div class="quick">
<button onclick="bookNow()">Boka nu</button>
<button onclick="setToday()">Idag</button>
<button onclick="setTomorrow()">Imorgon</button>
</div>

<label>Datum</label>
<input type="date" id="date">

<label>Starttid</label>
<input type="time" id="time">

<label>Längd</label>
<select id="hours">
<option value="1">1 timme</option>
<option value="2">2 timmar</option>
<option value="3">3 timmar</option>
</select>

<button class="book" onclick="book()">Boka bastu</button>

</div>

<h2>Bokningar</h2>

<div id="bookings"></div>

</div>

<script>

const SUPABASE_URL = "https://kcjiujdgeqjajvimweuj.supabase.co"
const SUPABASE_KEY = "sb_publishable_s4CHMttu96f7d-j3KZ3vAg_PftStbk-"

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

function setToday(){
let d=new Date()
document.getElementById("date").value=d.toISOString().split("T")[0]
}

function setTomorrow(){
let d=new Date()
d.setDate(d.getDate()+1)
document.getElementById("date").value=d.toISOString().split("T")[0]
}

function bookNow(){

let now=new Date()

let date=now.toISOString().split("T")[0]
document.getElementById("date").value=date

let h=now.getHours().toString().padStart(2,'0')
let m=now.getMinutes().toString().padStart(2,'0')

document.getElementById("time").value=h+":"+m

}

async function book(){

let date=document.getElementById("date").value
let time=document.getElementById("time").value
let hours=parseInt(document.getElementById("hours").value)

let parts=time.split(":")
let start=new Date()
start.setHours(parts[0])
start.setMinutes(parts[1])

let end=new Date(start.getTime()+hours*60*60*1000)
let endTime=end.toTimeString().slice(0,5)

await client
.from("bookings")
.insert([
{
date:date,
start:time,
end:endTime
}
])

loadBookings()

}

async function loadBookings(){

let { data } = await client
.from("bookings")
.select("*")
.order("date")

let html=""

data.forEach(b=>{

html+=`
<div class="booking">
${b.date} ${b.start} → ${b.end}
</div>
`

})

document.getElementById("bookings").innerHTML=html

}

loadBookings()

</script>

</body>
</html>
