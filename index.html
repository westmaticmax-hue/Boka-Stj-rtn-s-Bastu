<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bastu Bokning</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f2f4f7;
margin:0;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
}

h1{
text-align:center;
}

.card{
background:white;
padding:20px;
border-radius:14px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
margin-bottom:20px;
}

.quick{
display:flex;
gap:10px;
margin-bottom:15px;
}

.quick button{
flex:1;
padding:10px;
border:none;
border-radius:8px;
background:#e4e7ec;
font-size:16px;
}

label{
font-weight:600;
margin-top:10px;
display:block;
}

input,select{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
margin-top:4px;
}

.book{
width:100%;
margin-top:20px;
padding:14px;
background:#2e7d32;
color:white;
border:none;
border-radius:10px;
font-size:18px;
}

.booking{
background:white;
padding:14px;
border-radius:10px;
margin-bottom:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<div class="container">

<h1>🔥 Boka bastun </h1>

<div class="card">

<div class="quick">
<button onclick="bookNow()">Boka nu</button>
<button onclick="setToday()">Idag</button>
<button onclick="setTomorrow()">Imorgon</button>
</div>

<label>Datum</label>
<input type="date" id="date">

<label>Starttid</label>
<input type="time" id="time">

<label>Längd</label>
<select id="hours">
<option value="1">1 timme</option>
<option value="2">2 timmar</option>
<option value="3">3 timmar</option>
</select>

<button class="book" onclick="book()">Boka bastu</button>

</div>

<h2>Bokningar</h2>

<div id="bookings"></div>

</div>

<script>

const supabase = window.supabase.createClient(
"https://kcjiujdgeqjajvimweuj.supabase.co",
"sb_publishable_s4CHMttu96f7d-j3KZ3vAg_PftStbk-"
)

function setToday(){
let d=new Date()
document.getElementById("date").value=d.toISOString().split("T")[0]
}

function setTomorrow(){
let d=new Date()
d.setDate(d.getDate()+1)
document.getElementById("date").value=d.toISOString().split("T")[0]
}

function bookNow(){

let now=new Date()

let h=now.getHours().toString().padStart(2,'0')
let m=now.getMinutes().toString().padStart(2,'0')

document.getElementById("time").value=h+":"+m
setToday()

}

async function book(){

let date=document.getElementById("date").value
let start=document.getElementById("time").value
let hours=parseInt(document.getElementById("hours").value)

let parts=start.split(":")
let startDate=new Date()

startDate.setHours(parts[0])
startDate.setMinutes(parts[1])

let endDate=new Date(startDate.getTime()+hours*60*60*1000)

let end=endDate.toTimeString().slice(0,5)

const {error} = await supabase
.from("bookings")
.insert([
{
date:date,
start:start,
end_time:end
}
])

if(error){
alert("Fel: "+error.message)
}

loadBookings()

}

async function loadBookings(){

const {data,error}=await supabase
.from("bookings")
.select("*")
.order("date")

let html=""

data.forEach(b=>{

html+=`
<div class="booking">
${b.date} ${b.start} → ${b.end_time}
</div>
`

})

document.getElementById("bookings").innerHTML=html

}

loadBookings()

</script>

</body>
</html>
